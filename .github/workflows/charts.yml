name: Charts

# Validates chart correctness end to end: builds the real swarmcli renderer and
# renders every chart against its ci/ fixtures, then checks the output. Every
# step is data-only (no secrets, read-only token, render-never-deploy), so it is
# safe to run on fork PRs — enable "Require approval for all outside
# collaborators" so it gates contributions before human review. Mirrors
# `make test`, so local == CI.
#
# The workflow triggers on every PR (no path filter) but a change-detection job
# skips the heavy `validate` job when no chart-relevant files changed. A skipped
# required check counts as passing, so `validate` can be a required check that is
# effectively enforced only when relevant files change — without hanging
# unrelated PRs (a path-filtered trigger would leave the required check pending).
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: charts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Pushes always run; PRs run only when chart sources or the pipeline
          # itself changed, so the required `validate` check is enforced iff
          # relevant files changed (and reports skipped = pass otherwise).
          if [ "$EVENT" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags origin "$BASE_REF" >/dev/null 2>&1 || true
          changed=$(git diff --name-only "origin/$BASE_REF...HEAD" 2>/dev/null || git diff --name-only HEAD)
          if printf '%s\n' "$changed" | grep -qE '^(charts/|scripts/|Makefile|\.yamllint|\.github/workflows/charts\.yml)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No chart-relevant changes; skipping render."
          fi

  validate:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint charts (structure + YAML)
        run: scripts/lint.sh

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
          cache: false

      # swarmcli is the renderer. The charts CLI is only on swarmcli's main
      # branch today, so we build from source (see scripts/install-swarmcli.sh).
      - name: Build swarmcli renderer
        run: scripts/install-swarmcli.sh "$PWD/.swarmcli-bin"

      - name: Render + validate all charts
        run: SWARMCLI="$PWD/.swarmcli-bin/swarmcli" scripts/test-charts.sh

      - name: Upload rendered stacks
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rendered-stacks
          path: .rendered/
          if-no-files-found: ignore

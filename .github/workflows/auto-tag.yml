name: Auto Tag Chart

on:
  push:
    branches:
      - main
    paths:
      - 'charts/*/Chart.yaml'

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need full tag history to check existing tags

      - name: Detect changed Chart.yaml files
        id: changed
        run: |
          # Compare against the previous commit on main
          CHARTS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^charts/.*/Chart.yaml$' \
            | sed 's|charts/||; s|/Chart.yaml||' \
            | sort -u)
          echo "Detected changed charts: $CHARTS"
          # Encode as newline-safe JSON array for the matrix
          JSON=$(echo "$CHARTS" | jq -Rcs 'split("\n") | map(select(length > 0))')
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

      - name: Tag changed charts
        if: steps.changed.outputs.matrix != '[]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHARTS='${{ steps.changed.outputs.matrix }}'
          echo "$CHARTS" | jq -r '.[]' | while read -r CHART; do
            VERSION=$(grep '^version:' "charts/$CHART/Chart.yaml" | awk '{print $2}')
            TAG="${CHART}/v${VERSION}"

            # Skip if this tag already exists (idempotent — re-merges don't re-release)
            if git tag --list | grep -qx "$TAG"; then
              echo "Tag $TAG already exists, skipping"
              continue
            fi

            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
            echo "✓ Tagged $TAG → will trigger release.yml"
          done

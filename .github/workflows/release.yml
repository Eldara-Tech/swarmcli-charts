name: Release Chart

on:
  push:
    tags:
      - '*/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Parse chart name and version from tag
        id: parse
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          CHART=$(echo "$TAG" | cut -d/ -f1)
          VERSION=$(echo "$TAG" | cut -d/ -f2)
          SEMVER=${VERSION#v}                       # Helm/SemVer form, no leading "v"
          echo "chart=$CHART"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"

      - name: Verify chart directory exists
        run: |
          if [ ! -d "charts/${{ steps.parse.outputs.chart }}" ]; then
            echo "ERROR: charts/${{ steps.parse.outputs.chart }} does not exist"
            exit 1
          fi

      - name: Set chart version from tag
        run: |
          # The git tag is the source of truth: stamp its SemVer into Chart.yaml
          # so the packaged metadata matches the tag and the published index entry.
          sed -i -E "s/^version:.*/version: ${{ steps.parse.outputs.semver }}/" \
            charts/${{ steps.parse.outputs.chart }}/Chart.yaml
          grep '^version:' charts/${{ steps.parse.outputs.chart }}/Chart.yaml

      - name: Package chart
        id: package
        run: |
          FILENAME="${{ steps.parse.outputs.chart }}-${{ steps.parse.outputs.version }}.tgz"
          tar -czf "$FILENAME" -C charts ${{ steps.parse.outputs.chart }}
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        run: |
          sha256sum ${{ steps.package.outputs.filename }} > ${{ steps.package.outputs.filename }}.sha256
          cat ${{ steps.package.outputs.filename }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.parse.outputs.tag }}
          name: "${{ steps.parse.outputs.chart }} ${{ steps.parse.outputs.version }}"
          body: |
            ## ${{ steps.parse.outputs.chart }} ${{ steps.parse.outputs.version }}

            Install with SwarmCLI:
            ```bash
            swarmcli charts install ${{ steps.parse.outputs.chart }} swarmcli-charts/${{ steps.parse.outputs.chart }} --version ${{ steps.parse.outputs.semver }}
            ```
          files: |
            ${{ steps.package.outputs.filename }}
            ${{ steps.package.outputs.filename }}.sha256

  # Publish the regenerated index to the live GitHub Pages site. Pages on this
  # repo is configured with build_type=workflow, so it serves the artifact
  # uploaded here — NOT the gh-pages branch. A prior revision pushed to the
  # gh-pages branch instead, which is inert under this Pages config and silently
  # froze the served index. Keep using deploy-pages so releases actually go live.
  update-index:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0  # need full history/tags so `git show <tag>:path` works

      - name: Generate index.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-index.sh
          mkdir -p public
          ./scripts/generate-index.sh "${{ github.repository }}" > public/index.yaml
          echo "=== Generated index.yaml ==="
          cat public/index.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

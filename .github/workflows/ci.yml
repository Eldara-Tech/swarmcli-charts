name: CI

# Lints the release machinery itself — the GitHub Actions workflows and the
# shell scripts that package charts and build the index. A broken workflow or
# script silently fails releases, so this guards the parts chart-structure
# linting (charts.yml) doesn't cover.
#
# The workflow triggers on every PR (no path filter) but a change-detection job
# skips the `lint` job when no workflow/script files changed. A skipped required
# check counts as passing, so `lint` can be a required check enforced only when
# relevant files change, without leaving unrelated PRs pending.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags origin "$BASE_REF" >/dev/null 2>&1 || true
          changed=$(git diff --name-only "origin/$BASE_REF...HEAD" 2>/dev/null || git diff --name-only HEAD)
          if printf '%s\n' "$changed" | grep -qE '^(\.github/workflows/|scripts/)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No workflow/script changes; skipping machinery lint."
          fi

  lint:
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # actionlint validates workflow syntax and ${{ }} expressions. Its embedded
      # shellcheck pass is disabled here (-shellcheck=) so run-block style nits
      # don't fail the job; shell scripts are checked separately below.
      - name: Lint workflows (actionlint)
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color -shellcheck=

      # shellcheck is preinstalled on ubuntu runners. --severity=error fails only
      # on genuine bugs, not style warnings, so it won't block on existing scripts.
      - name: Lint shell scripts (shellcheck)
        run: shellcheck --severity=error scripts/*.sh

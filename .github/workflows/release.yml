name: Release Chart

on:
  push:
    tags:
      - '*/v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Parse chart name and version from tag
        id: parse
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          CHART=$(echo "$TAG" | cut -d/ -f1)
          VERSION=$(echo "$TAG" | cut -d/ -f2)
          echo "chart=$CHART"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"

      - name: Verify chart directory exists
        run: |
          if [ ! -d "charts/${{ steps.parse.outputs.chart }}" ]; then
            echo "ERROR: charts/${{ steps.parse.outputs.chart }} does not exist"
            exit 1
          fi

      - name: Package chart
        id: package
        run: |
          FILENAME="${{ steps.parse.outputs.chart }}-${{ steps.parse.outputs.version }}.tgz"
          tar -czf "$FILENAME" -C charts ${{ steps.parse.outputs.chart }}
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Generate checksum
        run: |
          sha256sum ${{ steps.package.outputs.filename }} > ${{ steps.package.outputs.filename }}.sha256
          cat ${{ steps.package.outputs.filename }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.parse.outputs.tag }}
          name: "${{ steps.parse.outputs.chart }} ${{ steps.parse.outputs.version }}"
          body: |
            ## ${{ steps.parse.outputs.chart }} ${{ steps.parse.outputs.version }}

            Install with SwarmCLI:
            ```bash
            swarmcli chart install ${{ steps.parse.outputs.chart }} --version ${{ steps.parse.outputs.version }}
            ```
          files: |
            ${{ steps.package.outputs.filename }}
            ${{ steps.package.outputs.filename }}.sha256

  update-index:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need full history/tags so `git show <tag>:path` works

      - name: Generate index.yaml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-index.sh
          ./scripts/generate-index.sh "${{ github.repository }}" > index.yaml
          echo "=== Generated index.yaml ==="
          cat index.yaml

      - name: Deploy index.yaml to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp index.yaml /tmp/index.yaml

          # Fetch all remote branches so we can check gh-pages
          git fetch origin

          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch exists, checking out"
            git checkout gh-pages
            git pull origin gh-pages
          else
            echo "gh-pages branch does not exist, creating orphan"
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi

          cp /tmp/index.yaml index.yaml
          git add index.yaml

          if git diff --cached --quiet; then
            echo "index.yaml unchanged, nothing to commit"
          else
            git commit -m "chore: update index.yaml [skip ci]"
            git push origin gh-pages
            echo "✓ index.yaml published to gh-pages"
          fi
